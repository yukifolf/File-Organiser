services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: yuki
      POSTGRES_PASSWORD: Wojtek2002
      POSTGRES_DB: file_organiser_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  node_modules:
  postgres_data:
  redis_data: